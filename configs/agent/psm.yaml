agent_name: psm
batch_size: 1024
z_dim: 128
max_log_seed: 16
num_parallel: 2
discount: 0.98
tau: 0.01
ortho_coef: 1.0
mix_ratio: 0.5
pessimism_penalty: 0.0
actor_pessimism_penalty: 0.5
actor_std: 0.2
stddev_clip: 0.3
norm_z: true
phi_input: s

lr_phi: 1.0e-4
lr_sf: 1.0e-4
lr_actor: 1.0e-4

phi:
  hidden_dim: 256
  hidden_layers: 2
sf:
  hidden_dim: 1024
  hidden_layers: 1
  embedding_layers: 2
actor:
  hidden_dim: 1024
  hidden_layers: 1
  embedding_layers: 2

ob_dims: null
action_dim: null
encoder: null
