# @package _global_
# Pixel cube-single FB. Mirrors td_jepa/scripts/train/pixel/launch_fb_ogbench.py.
defaults:
  - /agent: fb_flowbc
  - _self_

domain: cube-single-play-v0      # create_ogbench_env prepends "visual-" for pixels
agent: fb_flowbc
obs_type: pixels
frame_stack: 3

# Pixel module selection (consumed by train.build_pixel_cfgs)
obs_normalizer:
  name: RGBNormalizerConfig
rgb_encoder:
  name: drq
  feature_dim: 256
augmentator:
  name: random_shifts
  pad: 2

# Architecture deltas vs state (launch_fb_ogbench.py BASE_CFG)
L_dim: 256
z_dim: 50
batch_size: 256
discount: 0.99
ortho_coef: 1.0
f_target_tau: 0.005
b_target_tau: 0.005
bc_coeff: 3.0
left_encoder:
  hidden_dim: 512
  hidden_layers: 0
  norm: true
backward:
  hidden_dim: 512
  hidden_layers: 4
  norm: true
forward:
  hidden_dim: 512
  hidden_layers: 2
  embedding_layers: 2
  num_parallel: 2
actor:
  name: noise_conditioned_actor
  hidden_dim: 512
  hidden_layers: 2
  embedding_layers: 2
actor_vf:
  hidden_dim: 512
  hidden_layers: 4
