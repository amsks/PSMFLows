# Visual cube GCIVL: mirrors OGBench impls/hyperparameters.sh visual-cube-single
# GCIVL recipe exactly (--agent=agents/gcivl.py --agent.alpha=10.0
# --agent.batch_size=256 --agent.encoder=impala_small --agent.p_aug=0.5).
# Deltas vs the GCIQL visual config: agent_file + alpha + run_group.
defaults:
  - storage: shm
  - _self_
variant: visual
env_name: visual-cube-single-play-v0
agent_file: agents/gcivl.py
seed: 0
train_steps: 500000
log_interval: 5000
eval_interval: 100000
save_interval: 50000
eval_episodes: 50
eval_on_cpu: 0
run_group: factored-fb-gcivl-pixel
agent_overrides:
  alpha: 10.0
  batch_size: 256
  encoder: impala_small
  p_aug: 0.5
wandb_mode: online
